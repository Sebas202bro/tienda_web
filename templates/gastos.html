{% extends 'base.html' %}

{% block contenido %}

<h1 class="mb-4">Gastos</h1>

<!-- FORMULARIO -->
<div class="card mb-4 shadow-sm">
    <div class="card-body">

        <form action="/agregar_gasto" method="POST" class="row g-3">

            <div class="col-12 col-md-6">
                <label class="form-label">Descripción</label>
                <input type="text" name="descripcion"
                       class="form-control"
                       placeholder="Ej: Compra de mercadería"
                       required>
            </div>

            <div class="col-12 col-md-3">
                <label class="form-label">Monto</label>
                <input type="number" step="0.01" name="monto"
                       class="form-control"
                       placeholder="0.00"
                       required>
            </div>

            <div class="col-12 col-md-3 d-flex align-items-end">
                <button class="btn btn-danger w-100">
                    Registrar Gasto
                </button>
            </div>

        </form>

    </div>
</div>

<!-- TABLA -->
<div class="card shadow-sm">
    <div class="card-body">

        <div class="table-responsive">
            <table class="table table-hover text-center align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Descripción</th>
                        <th>Monto</th>
                        <th>Fecha</th>
                    </tr>
                </thead>

                <tbody>

                    {% if gastos %}
                        {% for g in gastos %}
                        <tr>
                            <td>{{ g[0] }}</td>
                            <td>{{ g[1] }}</td>
                            <td>${{ g[2] }}</td>
                            <td>{{ g[3] }}</td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="4">No hay gastos registrados</td>
                        </tr>
                    {% endif %}

                </tbody>

            </table>
        </div>

        <hr>

        <h4 class="text-danger">
            Total Gastos: ${{ total_gastos or 0 }}
        </h4>

    </div>
</div>

{% endblock %}
